<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gau Raksha Dal - ID Card | Tiranga Yuva Samiti</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=Rozha+One&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* === GLOBAL RESET === */
    html, body {
        margin: 0; padding: 0;
        background: #f4f7f6;
        min-height: 100vh;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
        overflow-x: hidden;
    }

    /* === NGO/TIRANGA VERIFICATION UI === */
    #tys-app-container {
        font-family: 'Poppins', sans-serif;
        width: 100%;
        padding: 40px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }
    #tys-app-container * { box-sizing: border-box; }

    #tys-app-container .controls-box {
        background: #ffffff;
        width: 100%;
        max-width: 550px;
        padding: 40px 35px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0, 35, 71, 0.08);
        margin-bottom: 40px;
        animation: fadeInUp 0.6s ease-out;
        position: relative;
        overflow: hidden;
        border: 1px solid #eef2f5;
    }
    
    .controls-box::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, #FF9933 0%, #FF9933 33.33%, #ffffff 33.33%, #ffffff 66.66%, #138808 66.66%, #138808 100%);
        border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .tys-header {
        margin-bottom: 30px;
        text-align: center;
        padding-bottom: 20px;
        border-bottom: 1px solid #eef2f5;
    }
    
    .tys-header h2 {
        color: #002347;
        margin: 0 0 8px 0;
        font-size: 28px;
        font-weight: 800;
        font-family: 'Noto Sans Devanagari', sans-serif;
    }
    
    .tys-header p {
        color: #138808;
        font-size: 15px;
        margin: 0;
        font-weight: 600;
    }

    .tys-input-group { margin-bottom: 24px; }
    
    .input-label {
        font-size: 13px;
        font-weight: 700;
        color: #002347;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .input-label i { color: #FF9933; font-size: 16px; }

    #tys-app-container .input-wrapper { position: relative; }
    
    #tys-app-container .input-field {
        width: 100%;
        padding: 16px 20px 16px 50px;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 16px;
        font-family: 'Poppins', sans-serif;
        color: #002347;
        transition: all 0.3s ease;
        font-weight: 500;
    }
    
    #tys-app-container .input-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
        font-size: 18px;
        transition: color 0.3s ease;
    }
    
    #tys-app-container .input-field:focus {
        outline: none;
        background: #ffffff;
        border-color: #002347;
        box-shadow: 0 0 0 4px rgba(0, 35, 71, 0.1);
    }

    #tys-app-container .input-field:focus + .input-icon, 
    #tys-app-container .input-field:focus ~ .input-icon { color: #002347; }
    
    #tys-app-container .input-field::placeholder {
        color: #94a3b8;
        font-size: 14px;
        font-weight: 400;
    }

    #tys-app-container .btn-verify {
        background: #138808;
        color: #ffffff;
        border: none;
        padding: 18px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(19, 136, 8, 0.2);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 30px;
    }
    
    #tys-app-container .btn-verify:hover {
        transform: translateY(-2px);
        background: #0f6e06;
        box-shadow: 0 8px 25px rgba(19, 136, 8, 0.3);
    }
    
    #tys-app-container .btn-verify:active { transform: translateY(0); }

    #tys-status {
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        min-height: 20px;
        padding: 16px;
        background: #f1f5f9;
        border-radius: 8px;
        margin-top: 25px;
        border: 1px solid #e2e8f0;
        color: #475569;
    }
    
    #tys-status.success { background: #ecfdf5; border-color: #10b981; color: #047857; }
    #tys-status.error { background: #fef2f2; border-color: #f87171; color: #b91c1c; }

    .security-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #eef2f5;
        color: #64748b;
        font-size: 12px;
        font-weight: 500;
    }
    
    .security-badge i { color: #10b981; font-size: 16px; }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #tys-grid {
        display: flex;
        flex-direction: column;
        gap: 30px;
        align-items: center;
        width: 100%;
    }

    .card-row {
        display: flex; flex-wrap: wrap; gap: 40px; justify-content: center;
        background: #ffffff; padding: 30px; border-radius: 16px;
        box-shadow: 0 10px 35px rgba(0, 35, 71, 0.05);
        border: 1px solid #eef2f5; width: 100%; max-width: 900px;
        animation: fadeInUp 0.5s ease-out;
    }
    .btn-print-wrap { width: 100%; display: flex; justify-content: center; margin-top: 10px; }
    .btn-print { 
        background: #002347;
        color: white; padding: 14px 30px; border: none; 
        border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600;
        display: inline-flex; align-items: center; gap: 8px;
        box-shadow: 0 4px 15px rgba(0, 35, 71, 0.2);
        transition: all 0.3s ease;
    }
    .btn-print:hover { background: #FF9933; transform: translateY(-2px); }

    @media (max-width: 768px) {
        #tys-app-container { padding: 20px 15px !important; }
        #tys-app-container .controls-box { padding: 30px 20px; border-radius: 12px; }
        .card-row { padding: 20px 10px; gap: 25px; }
        .id-card-wrapper { transform: scale(0.92); transform-origin: center top; margin-bottom: -20px; }
        .tys-header h2 { font-size: 24px; }
        #tys-app-container .input-field { font-size: 15px; padding: 14px 20px 14px 45px; }
    }

    @media (max-width: 480px) {
        .id-card-wrapper { transform: scale(0.85); margin-bottom: -35px; }
    }

    /* === ID CARD CSS === */
    .id-card-wrapper {
        width: 96mm; height: 65mm;
        position: relative; margin: 0 auto;
        border-radius: 0;
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    }

    .id-card-inner {
        width: 96mm; height: 65mm;
        background-color: #ffffff;
        background-image: radial-gradient(#002347 0.5px, transparent 0.5px), radial-gradient(#002347 0.5px, #ffffff 0.5px);
        background-size: 20px 20px; background-position: 0 0, 10px 10px; background-blend-mode: overlay;
        position: relative; overflow: hidden;
        border: 1px solid #aaa; border-radius: 0;
        font-family: 'Noto Sans Devanagari', sans-serif;
        display: flex; flex-direction: column; color: #000; line-height: normal;
    }

    .h-header { 
        height: 16mm;
        background: #002347; 
        display: flex; align-items: center; justify-content: space-between; 
        padding: 0 2mm; position: relative; z-index: 5;
        border-bottom: 1.8mm solid #d62d20; 
    }
    .h-logo, .h-cow { width: 14.5mm; height: 14.5mm; object-fit: contain; display: block; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
    .h-cow { border-radius: 50%; border: 1px solid white; background:white; object-fit: cover; }
    
    .h-titles { flex: 1; text-align: center; padding-top: 3.5mm; } 
    .h-main-title { 
        font-family: 'Rozha One', serif; font-size: 13.5pt; color: #ffffff; 
        line-height: 0.9; margin-top: 0; white-space: nowrap; 
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    .h-sub-title { 
        font-family: 'Noto Sans Devanagari', sans-serif; font-size: 6pt;
        font-weight: 700; color: #ffeb3b; line-height: 1.2; margin-top: 0.5mm; 
    }
    
    .h-tag { 
        position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
        font-size: 4pt;
        background: #d62d20; color: white; padding: 1px 8px; 
        border-radius: 0;
        text-transform: uppercase; font-weight: 800; 
        z-index: 10;
    }

    .h-body { 
        flex: 1; display: flex; flex-direction: column;
        padding: 2mm 3mm;
        position: relative; background: rgba(255,255,255,0.94); 
    }
    
    .bg-wm { 
        position: absolute; 
        top: 40%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        width: 30mm;
        opacity: 0.08; 
        pointer-events: none; 
        z-index: 0; 
        filter: grayscale(100%); 
    }

    .h-content-row { display: flex; width: 100%; flex: 1; }

    .h-left { width: 25mm; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
    
    .h-p-box { 
        width: 100%; height: 30mm;
        background: #fff; 
        position: relative; border: 1.5px solid #002347; border-radius: 0; overflow: hidden;
    }
    .h-p-img { width: 100%; height: 100%; object-fit: cover; }
    
    .h-stamp { 
        position: absolute; bottom: 0; right: 0; width: 14mm; 
        opacity: 0.9; mix-blend-mode: multiply; transform: rotate(-15deg); z-index: 10;
        display: none !important;
    }

    .h-sign-box { width: 100%; text-align: center; margin-top: 1mm; flex-shrink: 0; }
    .h-sign-img { height: 7mm; width: auto; max-width: 100%; display: block; margin: 0 auto; mix-blend-mode: multiply; }
    .h-sign-lbl { 
        font-size: 4pt; color: #002347; font-weight: 700; 
        border-top: 0.5px solid #000; padding-top: 0.5px; display: block; width: 100%;
    }

    .h-right { flex: 1; padding-left: 5mm; display: flex; flex-direction: column; position: relative; }
    
    .h-row-id { 
        font-size: 10pt; font-weight: 800; color: #d62d20;
        border-bottom: 1px dashed #002347; margin-bottom: 1.5mm; padding-bottom: 0.5mm;
        display: block; width: 100%; text-align: center; font-family: 'Poppins', sans-serif;
    }
    
    .h-grid { display: grid; grid-template-columns: 20mm 1fr; row-gap: 1.5mm; font-size: 7.5pt; }
    .hl { color: #002347; font-weight: 800; margin: 0; padding: 0; }
    .hv { color: #000; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; padding: 0; }

    .h-footer { 
        height: 5mm; background: #002347; color: white; 
        display: flex; align-items: center; justify-content: center; 
        font-size: 4pt; font-weight: 600; text-align: center; line-height: 1.1; 
        letter-spacing: 0px; border-top: 1px solid #d62d20; white-space: nowrap;
    }

    .vb-c { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2mm 3mm 2mm 3mm; text-align: center; background: rgba(255,255,255,0.95); }
    .h-header-back-title { margin-top: 2mm; color: white; font-family: 'Noto Sans Devanagari'; font-size: 12pt; font-weight: 700; }
    
    .vb-contact {
        margin-bottom: 2mm; font-size: 5pt; color: #002347; font-weight: 800; 
        border-bottom: 1px dashed #d62d20; padding-bottom: 1px; width: 95%; white-space: nowrap; overflow: hidden;
    }

    .vb-qr-row { 
        display: flex; 
        justify-content: center; 
        align-items: center;
        gap: 3mm; 
        margin-bottom: 2mm; 
        width: 100%;
    }
    .vb-qr-small { 
        width: 22mm; height: 22mm; 
        border: 1.5px solid #002347; 
        padding: 1px; 
        background: white; 
        border-radius: 0;
    }
    .vb-qr-small img { width: 100%; height: 100%; display: block; }

    .vb-t { font-size: 9pt; font-weight: 800; color: #002347; margin-bottom: 1mm; text-transform: uppercase; }
    .vb-s { font-size: 6.5pt; color: #444; width: 85%; font-weight: 600; line-height: 1.3; }

    .vb-barcode-row {
        width: 95%;
        height: 7mm;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 1mm;
    }
    .vb-bar-wrap { width: 100%; height: 100%; display: flex; justify-content: center; }
    .vb-bar-wrap svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="tys-app-container">
    <div class="controls-box">
        <div class="tys-header">
            <h2>ID Card</h2>
            <p>Enter Your Details</p>
        </div>

        <div class="tys-input-group">
            <label class="input-label">
                <i class="fa-solid fa-id-card-clip"></i>
                Member ID
            </label>
            <div class="input-wrapper">
                <i class="fa-solid fa-hashtag input-icon"></i>
                <input type="text" id="tysInputId" class="input-field" placeholder="Example: GRDM-1">
            </div>
        </div>

        <div class="tys-input-group">
            <label class="input-label">
                <i class="fa-solid fa-mobile-screen-button"></i>
                Phone Number
            </label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="text" id="tysInputPhone" class="input-field" placeholder="Example: 9053575169">
            </div>
        </div>

        <button class="btn-verify" onclick="tysVerify()">
            <i class="fa-solid fa-shield-check"></i>
            Get ID Card
        </button>

        <div id="tys-status">
            <i class="fa-solid fa-circle-check"></i> System Ready...
        </div>

        <div class="security-badge">
            <i class="fa-solid fa-lock"></i>
            <span>Secure and Encrypted Verification</span>
        </div>
    </div>

    <div id="tys-grid"></div>
</div>

<script>
    // === CONFIGURATION ===
    // Change this to your actual Worker URL after deployment
    const API_BASE = 'grd-api.tirangayuvasamiti-org-in.workers.dev/api';

    const SIGN_URL = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj72nNAiChUf9ROOPiYDrwg4RSatVygGQEt7yW1lOmQosfBW9MB2V3qZAcYcOHH-0bAb_2QBZSUsL_9xdVIdpZdvVOha0czW1ssESptg8Mg3X6W8K1DuyPio_oh6X4DdNH2xUhRc2fX1AkpJh2RuPYl5b0a16nYSTgGrkQnKuwYvz3lsQ/s1600/Lokesh%20Stamp.jpg";

    const ASSETS = {
        logo: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhCaJCRPLvQgi9REoAvb9b4H4Vvh6RhAmMRGwGEolXIqS2nxxCa9-jS7qexF2JL5puwPOEk-2q7ubDKeL-m-BM0_7_uHrI5EnBXue7deGtgta4UyCDnI43AkB1KBN8PV4G00fg1vW2La338AyzZkHvXpzt49papqeYLt9NDXMcTnvsceg/s1600/TYS-White.png",
        cow: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj4jRFVp4bz-d45e1q-rgRwa4yOre7RBcKtS-dxVu9ayVmpGTs8rHNx6M8xnO5zLkvS7_MOU2_l6k5i6J56mN5FymgLK9IE5eIDdfp2aNEB3xmrAHp8YzzRJ-5OZeT0-uRI_eeo3gE-ZQNFK-FuHmr9Cl_gYVVeFE7bHljkejal8S2LBw/s1600/cow-calf-image.jpg",
        stamp: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj72nNAiChUf9ROOPiYDrwg4RSatVygGQEt7yW1lOmQosfBW9MB2V3qZAcYcOHH-0bAb_2QBZSUsL_9xdVIdpZdvVOha0czW1ssESptg8Mg3X6W8K1DuyPio_oh6X4DdNH2xUhRc2fX1AkpJh2RuPYl5b0a16nYSTgGrkQnKuwYvz3lsQ/s1600/Lokesh%20Stamp.jpg"
    };

    function getProxy(url) {
        if (!url) return "https://via.placeholder.com/150";
        return `https://wsrv.nl/?url=${encodeURIComponent(url)}&output=png`;
    }

    function formatDate(val) {
        if (!val) return "";
        const d = new Date(val);
        if (isNaN(d.getTime())) return val;
        return `${d.getDate().toString().padStart(2,'0')}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getFullYear()}`;
    }

    async function tysVerify() {
        let inId = document.getElementById('tysInputId').value.trim();
        let inPhone = document.getElementById('tysInputPhone').value.trim();
        const grid = document.getElementById('tys-grid');
        const status = document.getElementById('tys-status');

        if (!inId || !inPhone) {
            status.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Please fill in both details.';
            status.className = 'error';
            return;
        }

        status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
        status.className = '';

        try {
            const response = await fetch(`${API_BASE}/get-member?id=${encodeURIComponent(inId)}`);
            
            if (!response.ok) {
                status.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> <span style="color:#dc3545">Member not found.</span>';
                status.className = 'error';
                grid.innerHTML = '';
                return;
            }

            const result = await response.json();

            if (!result.success || !result.member) {
                status.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> <span style="color:#dc3545">Member not found.</span>';
                status.className = 'error';
                grid.innerHTML = '';
                return;
            }

            const member = result.member;

            // Verify phone matches
            const memberPhone = String(member.phone || '').trim();
            if (!memberPhone.includes(inPhone) && !inPhone.includes(memberPhone.slice(-10))) {
                status.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> <span style="color:#dc3545">Incorrect details.</span>';
                status.className = 'error';
                grid.innerHTML = '';
                return;
            }

            status.innerHTML = '<i class="fa-solid fa-circle-check"></i> <span style="color:#28a745">Verification Successful!</span>';
            status.className = 'success';
            tysRender(member);

        } catch (e) {
            console.error(e);
            status.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> <span style="color:#dc3545">Connection error. Please try again.</span>';
            status.className = 'error';
        }
    }

    function tysRender(data) {
        const grid = document.getElementById('tys-grid');
        const fullID = data.id || "TYS-GRDM-0";
        const name = `${data.firstname || ''} ${data.lastname || ''}`.trim();
        const father = data.father_name || "";
        const phone = data.phone || "";
        const dob = formatDate(data.dob) || "________";
        const validityDate = formatDate(data.validity) || "Lifetime";
        const address = data.address || "VPO Khanda";
        const blood = data.blood_group || "";
        const designation = data.designation || "Member";
        
        let qrText = data.qr_url || `https://www.tirangayuvasamiti.org/verify?id=${fullID}`;
        let newQrText = `https://www.tirangayuvasamiti.org/gau-raksha-dal-member-verification/?id=${data.short_id || fullID}`;

        const photoUrl = getProxy(data.photo_url);
        const logoUrl = getProxy(ASSETS.logo);
        const cowUrl = getProxy(ASSETS.cow);
        const stampUrl = getProxy(ASSETS.stamp);
        const signatureUrl = getProxy(SIGN_URL);

        const safeId = fullID.replace(/[^a-zA-Z0-9]/g, '');
        const frontId = `cf-${safeId}`;
        const backId = `cb-${safeId}`;

        grid.innerHTML = `
            <div class="card-row">
                <div>
                    <div style="text-align:center; font-weight:bold; color:#002347; margin-bottom:5px;">FRONT SIDE</div>
                    <div class="id-card-wrapper">
                        <div class="id-card-inner" id="${frontId}">
                            <div class="h-header">
                                <div class="h-tag">IDENTITY CARD</div>
                                <img src="${logoUrl}" class="h-logo" crossorigin="anonymous">
                                <div class="h-titles">
                                    <div class="h-main-title">Gau Raksha Dal (Haryana)</div>
                                    <div class="h-sub-title">Tiranga Yuva Samiti (Reg. No. 01820)<br>VPO Khanda, Tehsil Kharkhoda, Sonipat (Haryana)</div>
                                </div>
                                <img src="${cowUrl}" class="h-cow" crossorigin="anonymous">
                            </div>
                            <div class="h-body">
                                <img src="${logoUrl}" class="bg-wm" crossorigin="anonymous">
                                
                                <div class="h-content-row">
                                    <div class="h-left">
                                        <div class="h-p-box">
                                            <img src="${photoUrl}" class="h-p-img" crossorigin="anonymous">
                                            <img src="${stampUrl}" class="h-stamp" crossorigin="anonymous">
                                        </div>
                                        <div class="h-sign-box">
                                            <img src="${signatureUrl}" class="h-sign-img" crossorigin="anonymous"> 
                                            <span class="h-sign-lbl">(Authorized Signatory)</span>
                                        </div>
                                    </div>
                                    <div class="h-right">
                                        <div class="h-row-id">Sr. No.: ${fullID}</div>
                                        <div class="h-grid">
                                            <div class="hl">Name:</div><div class="hv" style="font-size:8.5pt; color:#002347;">${name}</div>
                                            <div class="hl">Father's Name:</div><div class="hv">${father}</div>
                                            <div class="hl">D.O.B.:</div><div class="hv">${dob}</div>
                                            <div class="hl">Designation:</div><div class="hv"><span style="background:#d62d20; color:white; padding:1px 6px; border-radius:0; display:inline-block; font-size:7pt; line-height:1.2;">${designation}</span></div>
                                            <div class="hl">Mobile:</div><div class="hv">${phone}</div>
                                            <div class="hl">Address:</div><div class="hv" style="font-size:6.5pt; line-height:1.2; white-space:normal;">${address}</div>
                                            <div class="hl">Validity:</div>
                                            <div class="hv" style="display:flex; justify-content:space-between;">
                                                <span>${validityDate}</span>
                                                <span style="font-size:6.5pt; color:#d62d20; font-weight:800;">Blood Group: <span style="color:black;">${blood}</span></span>

                                    </div>
                                </div>
                            </div>
                            <div class="h-footer"></div>
                        </div>
                    </div>
                </div>
                <div>
                    <div style="text-align:center; font-weight:bold; color:#002347; margin-bottom:5px;">BACK SIDE</div>
                    <div class="id-card-wrapper">
                        <div class="id-card-inner" id="${backId}">
                            <div class="h-header" style="justify-content:center; background:#002347; border-bottom: 2mm solid #d62d20;">
                                <div class="h-header-back-title">Verification & Rules</div>
                            </div>
                            <div class="h-body vb-c">
                                <div class="vb-contact" style="white-space: normal; line-height: 1.2; height: auto;">VPO Khanda 9R – 131402, Tehsil Kharkhoda, Sonipat, Haryana, India<br>Contact: +91 90535 75169 | info@tirangayuvasamiti.org | www.tirangayuvasamiti.org</div>
                                <div class="vb-t">Scan to verify membership</div>
                                
                                <div class="vb-qr-row">
                                    <div id="qr-old-${safeId}" class="vb-qr-small"></div>
                                    <div id="qr-new-${safeId}" class="vb-qr-small"></div>
                                </div>

                                <div class="vb-s">This card is the property of Tiranga Yuva Samiti.<br>If found, please return to the above address.</div>
                                <div style="margin-top:1mm; font-weight:800; color:#d62d20; font-size: 8pt; white-space: nowrap;">Jai Hind - Jai Bharat - Jai Gau Mata</div>
                                
                                <div class="vb-barcode-row">

            </div>
            <div class="btn-print-wrap">
                <button class="btn-print" onclick="tysPrintNew('${frontId}', '${backId}')"><i class="fa-solid fa-print"></i> Print ID Card</button>

        `;

        setTimeout(() => {
            JsBarcode(`#bar-${safeId}`, fullID, { format: "CODE128", displayValue: false, height: 25, width: 1.2, margin: 0, background: "transparent" });
            new QRCode(document.getElementById(`qr-old-${safeId}`), { text: qrText, width: 75, height: 75, correctLevel: QRCode.CorrectLevel.M });
            new QRCode(document.getElementById(`qr-new-${safeId}`), { text: newQrText, width: 75, height: 75, correctLevel: QRCode.CorrectLevel.M });
        }, 100);
    }

    // === PRINT LOGIC ===
    function tysPrintNew(fid, bid) {
        function nodeToDataURL(element) {
            const serializer = new XMLSerializer();
            const str = serializer.serializeToString(element);
            return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(str)));
        }

        const frontClone = document.getElementById(fid).cloneNode(true);
        const frontHTML = frontClone.outerHTML;

        const originalBack = document.getElementById(bid);
        const backClone = originalBack.cloneNode(true);
        
        const origQrDivs = originalBack.querySelectorAll('.vb-qr-small');
        const cloneQrDivs = backClone.querySelectorAll('.vb-qr-small');
        origQrDivs.forEach((origDiv, index) => {
            const origCanvas = origDiv.querySelector('canvas');
            const origImg = origDiv.querySelector('img');
            let imgSrc = null;
            if (origCanvas) imgSrc = origCanvas.toDataURL("image/png");
            else if (origImg) imgSrc = origImg.src;

            if (imgSrc && cloneQrDivs[index]) {
                const targetDiv = cloneQrDivs[index];
                targetDiv.innerHTML = '';
                const newImg = document.createElement('img');
                newImg.src = imgSrc;
                newImg.style.width = '100%';
                newImg.style.height = '100%';
                newImg.style.display = 'block';
                targetDiv.appendChild(newImg);
            }
        });

        const barcodeSvg = backClone.querySelector('svg');
        if (barcodeSvg) {
            const img = document.createElement('img');
            img.src = nodeToDataURL(barcodeSvg);
            img.style.width = "100%";
            img.style.height = "100%";
            img.style.display = "block";
            barcodeSvg.parentNode.replaceChild(img, barcodeSvg);
        }

        const backHTML = backClone.outerHTML;

        const win = window.open('', '_blank', 'width=900,height=800');
        
        win.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Print ID Card</title>
                <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=Rozha+One&display=swap" rel="stylesheet">
                <style>
                    @page { size: A4; margin: 10mm; }
                    html, body { margin: 0; padding: 20px; background: #fff; font-family: 'Noto Sans Devanagari', sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                    .print-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10mm; }
                    .cut-wrapper { border: 1px dashed #999; padding: 1px; display: inline-block; }
                    .id-card-inner { width: 96mm; height: 65mm; background: white; position: relative; overflow: hidden; border: 1px solid #aaa; border-radius: 0; display: flex; flex-direction: column; line-height: normal; }
                    .h-header { height: 16mm; background: #002347; display: flex; align-items: center; justify-content: space-between; padding: 0 2mm; position: relative; z-index: 5; border-bottom: 1.8mm solid #d62d20; }
                    .h-logo, .h-cow { width: 14.5mm; height: 14.5mm; object-fit: contain; } 
                    .h-cow { border-radius: 50%; border: 1px solid white; object-fit: cover; }
                    .h-titles { flex: 1; text-align: center; padding-top: 3.5mm; }
                    .h-main-title { font-family: 'Rozha One', serif; font-size: 13.5pt; color: white; line-height: 0.9; margin:0; white-space: nowrap; }
                    .h-sub-title { font-size: 6pt; font-weight: 700; color: #ffeb3b; line-height: 1.2; margin-top: 0.5mm; }
                    .h-tag { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 4pt; background: #d62d20; color: white; padding: 1px 8px; border-radius: 0; text-transform: uppercase; font-weight: 800; z-index:10; }
                    .h-body { flex: 1; display: flex; flex-direction: column; padding: 2mm 3mm; position: relative; background: rgba(255,255,255,0.94); }
                    .bg-wm { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 30mm; opacity: 0.08; z-index: 0; }
                    .h-content-row { display: flex; width: 100%; flex: 1; }
                    .h-left { width: 25mm; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
                    .h-p-box { width: 22mm; height: 30mm; background: #fff; position: relative; border: 1.5px solid #002347; border-radius: 0; overflow: hidden; }
                    .h-p-img { width: 100%; height: 100%; object-fit: cover; }
                    .h-stamp { display: none !important; }
                    .h-sign-box { width: 100%; text-align: center; margin-top: 1mm; flex-shrink: 0; }
                    .h-sign-img { height: 7mm; width: auto; max-width: 100%; display: block; margin: 0 auto; mix-blend-mode: multiply; }
                    .h-sign-lbl { font-size: 4pt; color: #002347; font-weight: 700; border-top: 0.5px solid #000; padding-top: 0.5px; display: block; width: 100%; }
                    .h-right { flex: 1; padding-left: 5mm; display: flex; flex-direction: column; position: relative; }
                    .h-row-id { font-size: 10pt; font-weight: 800; color: #d62d20; border-bottom: 1px dashed #002347; margin-bottom: 1.5mm; padding-bottom: 0.5mm; display: block; width: 100%; text-align: center; }
                    .h-grid { display: grid; grid-template-columns: 20mm 1fr; row-gap: 1.5mm; font-size: 7.5pt; }
                    .hl { color: #002347; font-weight: 800; } .hv { color: #000; font-weight: 700; white-space: nowrap; overflow: hidden; }
                    .h-footer { height: 5mm; background: #002347; color: white; display: flex; align-items: center; justify-content: center; font-size: 4pt; font-weight: 600; text-align: center; line-height: 1.1; border-top: 1px solid #d62d20; white-space: nowrap; }
                    .h-header-back-title { margin-top: 2mm; color: white; font-family: 'Noto Sans Devanagari'; font-size: 12pt; font-weight: 700; }
                    .vb-c { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2mm 3mm; text-align: center; }
                    .vb-qr-row { display: flex; justify-content: center; align-items: center; gap: 3mm; margin-bottom: 2mm; width: 100%; }
                    .vb-qr-small { width: 22mm; height: 22mm; border: 1.5px solid #002347; padding: 1px; border-radius: 0; } 
                    .vb-qr-small img { width: 100%; height: 100%; }
                    .vb-t { font-size: 9pt; font-weight: 800; color: #002347; margin-bottom: 1mm; text-transform: uppercase; }
                    .vb-s { font-size: 6.5pt; color: #444; width: 85%; font-weight: 600; line-height: 1.3; }
                    .vb-contact { margin-bottom: 2mm; font-size: 5pt; color: #002347; font-weight: 800; border-bottom: 1px dashed #d62d20; padding-bottom: 1px; width: 95%; white-space: normal; overflow: hidden; }
                    .vb-barcode-row { width: 95%; height: 7mm; display: flex; justify-content: center; align-items: center; margin-top: 1mm; }
                    .vb-bar-wrap { width: 100%; height: 100%; display: flex; justify-content: center; }
                    .vb-bar-wrap svg, .vb-bar-wrap img { width: 100%; height: 100%; object-fit: contain; }
                </style>
            </head>
            <body>
                <div class="print-container">
                    <div class="cut-wrapper">${frontHTML}</div>
                    <div class="cut-wrapper">${backHTML}</div>
                </div>
            </body>
            </html>
        `);
        win.document.close();
        win.onload = function() {
            setTimeout(() => { win.focus(); win.print(); }, 1000);
        };
    }
</script>
</body>
</html>
